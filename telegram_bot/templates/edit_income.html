<!-- templates/edit_income.html -->

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактировать Доход</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Редактировать Доход</h2>
        <form action="{{ url_for('edit_income', order_id=order_id, income_id=income.income_id) }}" method="post" class="row g-3">
            <!-- Добавление CSRF-токена -->
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="col-md-4">
                <label for="amount" class="form-label">Сумма</label>
                <input type="number" step="0.01" class="form-control" id="amount" name="amount" value="{{ income.amount }}" required>
            </div>
            <div class="col-md-4">
                <label for="description" class="form-label">Описание</label>
                <input type="text" class="form-control" id="description" name="description" value="{{ income.description }}">
            </div>
            <div class="col-md-4">
                <label for="income_date" class="form-label">Дата Дохода</label>
                <input type="datetime-local" class="form-control" id="income_date" name="income_date" value="{{ income.income_date | format_datetime('%Y-%m-%dT%H:%M') }}" required>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">Сохранить Изменения</button>
                <a href="{{ url_for('order_detail', order_id=order_id) }}" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
    
    <!-- Bootstrap JS (Optional) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
