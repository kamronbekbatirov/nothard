<!-- templates/edit_user.html -->

{% extends "dashboard.html" %}

{% block content %}
<h2 class="mb-4">Редактировать профиль пользователя {{ user['user_id'] }}</h2>
<form action="{{ url_for('edit_user', user_id=user['user_id']) }}" method="post">
    <div class="mb-3">
        <label for="name" class="form-label">Имя</label>
        <input type="text" class="form-control" id="name" name="name" value="{{ user['name'] }}" required>
    </div>
    <div class="mb-3">
        <label for="phone" class="form-label">Телефон</label>
        <input type="text" class="form-control" id="phone" name="phone" value="{{ user['phone'] }}">
    </div>
    <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email" value="{{ user['email'] }}">
    </div>
    <div class="mb-3">
        <label for="bonuses" class="form-label">Бонусы</label>
        <input type="number" class="form-control" id="bonuses" name="bonuses" value="{{ user['bonuses'] }}">
    </div>
    <div class="mb-3">
        <label for="language" class="form-label">Язык</label>
        <select name="language" id="language" class="form-select">
            <option value="en" {% if user['language'] == 'en' %}selected{% endif %}>English</option>
            <option value="ru" {% if user['language'] == 'ru' %}selected{% endif %}>Русский</option>
            <option value="uz" {% if user['language'] == 'uz' %}selected{% endif %}>Oʻzbekcha</option>
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Сохранить изменения</button>
    <a href="{{ url_for('users') }}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
