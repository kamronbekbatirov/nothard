<!-- templates/edit_event.html -->

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактировать Событие</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Редактировать Событие</h2>
        <form action="{{ url_for('edit_event', order_id=order_id, event_id=event.event_id) }}" method="post" class="row g-3">
            <!-- Добавление CSRF-токена -->
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="col-md-6">
                <label for="description" class="form-label">Описание события</label>
                <input type="text" class="form-control" id="description" name="description" value="{{ event.event_description }}" placeholder="Описание события" required>
            </div>
            <div class="col-md-6">
                <label for="event_date" class="form-label">Дата События</label>
                <input type="datetime-local" class="form-control" id="event_date" name="event_date" value="{{ event.event_timestamp | format_datetime('%Y-%m-%dT%H:%M') }}" required>
            </div>
            <div class="col-md-12">
                <label for="link" class="form-label">Ссылка (опционально)</label>
                <input type="url" class="form-control" id="link" name="link" value="{{ event.event_link }}" placeholder="https://example.com">
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">Сохранить Изменения</button>
                <a href="{{ url_for('order_detail', order_id=order_id) }}" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
    
    <!-- Bootstrap JS (Optional) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
