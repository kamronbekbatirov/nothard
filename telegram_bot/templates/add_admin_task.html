<!-- templates/add_admin_task.html -->

{% extends "base.html" %}

{% block title %}Добавить Задачу{% endblock %}

{% block content %}
<h1 class="mb-4">Добавить Задачу</h1>

<form method="post" action="{{ url_for('add_admin_task') }}">
    <div class="mb-3">
        <label for="description" class="form-label">Описание Задачи:</label>
        <textarea name="description" id="description" class="form-control" rows="3" required>{{ request.form.description }}</textarea>
    </div>
    <div class="mb-3">
        <label for="status" class="form-label">Статус:</label>
        <select name="status" id="status" class="form-select" required>
            <option value="Не выполнено" {% if request.form.status == 'Не выполнено' %}selected{% endif %}>Не выполнено</option>
            <option value="Выполняется" {% if request.form.status == 'Выполняется' %}selected{% endif %}>Выполняется</option>
            <option value="Выполнено" {% if request.form.status == 'Выполнено' %}selected{% endif %}>Выполнено</option>
        </select>
    </div>
    <div class="mb-3">
        <label for="order_id" class="form-label">ID Заказа (опционально):</label>
        <select name="order_id" id="order_id" class="form-select">
            <option value="">— Без привязки к заказу —</option>
            {% for oid in orders %}
            <option value="{{ oid }}" {% if request.form.order_id == oid|string %}selected{% endif %}>{{ oid }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Добавить Задачу</button>
    <a href="{{ url_for('admin_tasks') }}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
